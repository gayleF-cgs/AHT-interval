<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AHT Interval Report</title>

  <!-- DataTables CSS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
  </style>
</head>
<body>
  <h1>CBH CC AHT Interval Report as of 10 AM EST</h1>
  <p>Source: <code>cbhcc.csv</code></p>

  <table id="tbl" class="display" style="width:100%"></table>

  <!-- jQuery (required by DataTables in many setups) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>

  <!-- Papa Parse (CSV parser) -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
    // Load CSV, build HTML table, then activate DataTables
    Papa.parse("cbhcc.csv", {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        const data = results.data;
        const columns = results.meta.fields.map(name => ({ title: name, data: name }));

        // Create DataTable
        new DataTable("#tbl", {
          data,
          columns,
          pageLength: 25
        });
      },
      error: function(err) {
        console.error(err);
        document.body.insertAdjacentHTML("beforeend",
          `<p style="color:red;">Failed to load CSV: ${err}</p>`
        );
      }
    });
  </script>
</body>
</html>
